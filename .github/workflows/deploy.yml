name: Build and Deploy Translation

on:
  workflow_dispatch:

permissions:
  contents: write 
  pages: write
  id-token: write

jobs:
  build-game:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Run Build Script
        env:
          SECRET_CSV_URL: ${{ secrets.CSV_URL }}
        run: python build_game.py

      - name: Commit and push Changelog
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add changelog.txt translation_state.json
          git commit -m "📝 Авто-обновление Changelog" || echo "Нет новых изменений для сохранения"
          git push origin HEAD:${{ github.ref }}

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy-to-pages:
    needs: build-game
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
